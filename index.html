<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>화물차 운행일보</title>
  <style>
      body { min-height: 100dvh; display: flex; flex-direction: column; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-white text-gray-800 font-sans pb-16">

<!-- TopAppBar -->
<header class="bg-[#6366F1] items-center w-full sticky top-0 z-50 flex justify-between px-5">
  <div class="py-5 flex items-center h-full">
    <h1 class="font-bold text-[24px] tracking-tight text-white m-0 leading-none drop-shadow-sm">화물차 운행일보</h1>
  </div>
  <button id="signOutBtn" class="hidden text-white text-[12px] bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded-md font-bold transition-colors cursor-pointer">로그아웃</button>
</header>

<main class="flex-1 flex flex-col pb-16">
  <!-- View: Input -->
  <div id="view-input" class="flex-1 flex flex-col pt-0 px-0 pb-0 bg-white">
    <!-- Input Section -->
    <section class="bg-white flex flex-col gap-4 flex-1 overflow-y-auto px-4 pt-4">
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1.5">
          <label class="text-[12px] font-extrabold uppercase tracking-wider text-indigo-500" for="startDateInput">출발 날짜 <span class="text-pink-500">*</span></label>
          <input type="date" id="startDateInput" class="w-full bg-slate-50 border border-slate-200 shadow-inner p-2.5 text-[14px] font-medium text-gray-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white transition-all">
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-[12px] font-extrabold uppercase tracking-wider text-indigo-500" for="endDateInput">도착 날짜 <span class="text-pink-500">*</span></label>
          <input type="date" id="endDateInput" class="w-full bg-slate-50 border border-slate-200 shadow-inner p-2.5 text-[14px] font-medium text-gray-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white transition-all">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4 mt-1">
        <div class="flex flex-col gap-1.5">
          <label class="text-[12px] font-extrabold uppercase tracking-wider text-indigo-500" for="originInput">출발지 <span class="text-pink-500">*</span></label>
          <input id="originInput" class="w-full bg-slate-50 border border-slate-200 shadow-inner p-2.5 text-[14px] font-medium text-gray-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white transition-all" type="text" placeholder="예: 서울">
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-[12px] font-extrabold uppercase tracking-wider text-indigo-500" for="destInput">도착지 <span class="text-pink-500">*</span></label>
          <input id="destInput" class="w-full bg-slate-50 border border-slate-200 shadow-inner p-2.5 text-[14px] font-medium text-gray-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white transition-all" type="text" placeholder="예: 부산">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4 mt-1">
        <div class="flex flex-col gap-1.5">
          <label class="text-[12px] font-extrabold uppercase tracking-wider text-indigo-500" for="incomeInput">운임 (KRW) <span class="text-pink-500">*</span></label>
          <input id="incomeInput" class="w-full bg-slate-50 border border-slate-200 shadow-inner p-2.5 text-[14px] font-medium text-gray-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white transition-all" type="text" placeholder="0">
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-[12px] font-extrabold uppercase tracking-wider text-indigo-500" for="fuelCostInput">유류비 (원)</label>
          <input id="fuelCostInput" class="w-full bg-slate-50 border border-slate-200 shadow-inner p-2.5 text-[14px] font-medium text-gray-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white transition-all" type="text" placeholder="0">
        </div>
      </div>

      <div class="flex flex-col gap-1.5 mt-1">
        <label class="text-[12px] font-extrabold uppercase tracking-wider text-indigo-500" for="memoInput">화물 내역 / 메모</label>
        <textarea id="memoInput" class="w-full bg-slate-50 border border-slate-200 shadow-inner p-2.5 text-[14px] font-medium text-gray-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white transition-all resize-y" rows="2" placeholder="예: 파렛트 10개"></textarea>
      </div>

      <div class="flex items-center gap-2 mt-2 ml-1">
        <input type="checkbox" id="receiptInput" class="w-4 h-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500 accent-indigo-600 cursor-pointer">
        <label for="receiptInput" class="text-[13px] font-bold text-gray-700 cursor-pointer select-none">인수증 확인</label>
      </div>

      <!-- Save Button -->
      <div class="flex gap-2 mt-4">
        <button id="cancelBtn" class="hidden w-1/3 bg-white text-slate-600 border border-slate-200 p-3.5 rounded-lg font-bold text-[14px] shadow-sm hover:bg-slate-50 transition-all cursor-pointer">
          수정 취소
        </button>
        <button id="saveBtn" class="flex-1 w-full bg-gradient-to-r from-indigo-500 to-indigo-600 text-white border-none p-3.5 rounded-lg font-bold text-[15px] shadow-[0_4px_14px_0_rgba(99,102,241,0.39)] hover:shadow-[0_6px_20px_rgba(99,102,241,0.23)] hover:scale-[1.01] active:scale-[0.98] transition-all cursor-pointer truncate">
          기록 저장
        </button>
      </div>

    </section>
  </div>

  <!-- View: Log -->
  <div id="view-log" class="flex-1 flex flex-col hidden">
    <!-- Control/Summary Section -->
    <section class="mx-0 mt-0 grid grid-cols-2 gap-0 border-b border-slate-100">
      <div class="bg-gradient-to-br from-emerald-400 to-emerald-500 rounded-none p-5 shadow-none text-white relative overflow-hidden">
         <div class="absolute -right-4 -top-4 w-16 h-16 bg-white/20 rounded-full blur-md"></div>
         <p id="totalIncomeLabel" class="text-[11px] font-bold uppercase opacity-90 mb-1 drop-shadow-sm">이번 달 총 매출</p>
         <p id="totalIncome" class="text-[20px] font-bold drop-shadow-sm">0</p>
      </div>
      <div class="bg-gradient-to-br from-pink-400 to-pink-500 rounded-none p-5 shadow-none text-white relative overflow-hidden">
         <div class="absolute -right-4 -top-4 w-16 h-16 bg-white/20 rounded-full blur-md"></div>
         <p id="totalFuelCostLabel" class="text-[11px] font-bold uppercase opacity-90 mb-1 drop-shadow-sm">이번 달 유류비</p>
         <p id="totalFuelCost" class="text-[20px] font-bold drop-shadow-sm">0</p>
      </div>
    </section>

    <!-- Table Section -->
    <section class="bg-white m-0 flex flex-col flex-1 overflow-hidden">
      <!-- Header -->
      <div class="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50/50">
        <h3 id="logViewTitle" class="font-bold text-[15px] text-gray-800 drop-shadow-sm">최근 운행 일지</h3>
        <button id="downloadExcelBtn" class="font-bold text-[11px] uppercase tracking-wide bg-white border border-slate-200 text-slate-600 rounded-md shadow-sm px-3 py-1.5 hover:bg-slate-50 hover:text-indigo-600 transition-all cursor-pointer">
          엑셀 다운로드
        </button>
      </div>

      <div class="overflow-x-auto overflow-y-auto no-scrollbar flex-1 p-0">
        <table class="w-full min-w-[340px] border-collapse text-left">
          <thead class="bg-slate-50 sticky top-0 z-10 shadow-sm border-b border-slate-200">
            <tr>
              <th class="p-2 text-[10px] text-indigo-400 font-extrabold uppercase w-[55px] text-center tracking-wider">날짜</th>
              <th class="p-2 text-[10px] text-indigo-400 font-extrabold uppercase w-[28%] tracking-wider">경로</th>
              <th class="p-2 text-[10px] text-indigo-400 font-extrabold uppercase tracking-wider">내역 및 주유</th>
              <th class="p-2 text-[10px] text-indigo-400 font-extrabold uppercase text-right w-[70px] tracking-wider">매출액</th>
              <th class="p-2 text-[10px] text-indigo-400 font-extrabold uppercase text-center w-[40px] tracking-wider">관리</th>
            </tr>
          </thead>
          <tbody id="logTableBody" class="divide-y divide-slate-100">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- View: Summary -->
  <div id="view-summary" class="flex-1 flex flex-col hidden overflow-y-auto">
    <section class="p-4 flex flex-col gap-4 bg-white">
      <h2 class="text-[20px] font-extrabold text-gray-800 drop-shadow-sm ml-2">월별 통계</h2>
      <div id="summaryContainer" class="flex flex-col gap-0 border-y border-slate-100">
        <!-- Populated by JS -->
      </div>
    </section>
  </div>
</main>

<!-- Delete Confirm Modal -->
<div id="delete-modal" class="fixed inset-0 bg-black/50 z-[100] flex justify-center items-center opacity-0 pointer-events-none transition-opacity">
  <div class="bg-white rounded-xl shadow-xl p-6 w-11/12 max-w-sm mx-auto transform scale-95 transition-transform" id="delete-modal-content" style="min-width: 280px; text-align: center;">
    <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
    </div>
    <h3 class="text-lg font-bold text-gray-900 mb-2">기록 삭제</h3>
    <p class="text-sm text-gray-500 mb-6">이 운행 기록을 정말 삭제하시겠습니까? 삭제된 기록은 복구할 수 없습니다.</p>
    <div class="flex gap-3">
      <button id="cancel-delete-btn" class="flex-1 bg-white border border-slate-200 text-slate-700 font-bold py-2.5 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer">취소</button>
      <button id="confirm-delete-btn" class="flex-1 bg-red-500 text-white font-bold py-2.5 rounded-lg hover:bg-red-600 transition-colors cursor-pointer shadow-sm">삭제</button>
    </div>
  </div>
</div>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 grid grid-cols-3 h-16 bg-white shadow-[0_-10px_30px_rgb(0,0,0,0.05)] border-t border-slate-100 overflow-hidden">
  <a id="nav-input" class="flex flex-col items-center justify-center text-indigo-600 bg-indigo-50 transition-colors" href="#">
    <span class="text-[13px] font-extrabold tracking-wider font-sans">정보 입력</span>
  </a>
  <a id="nav-log" class="flex flex-col items-center justify-center text-slate-400 hover:text-indigo-500 hover:bg-slate-50 transition-colors relative" href="#">
    <span class="text-[13px] font-bold tracking-wider font-sans">운행 일지</span>
  </a>
  <a id="nav-summary" class="flex flex-col items-center justify-center text-slate-400 hover:text-indigo-500 hover:bg-slate-50 transition-colors relative" href="#">
    <span class="text-[13px] font-bold tracking-wider font-sans">월별 통계</span>
  </a>
</nav>

<script type="module" src="/src/main.ts"></script>

<div id="auth-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6 text-center">
  <h2 class="text-2xl font-bold text-gray-800 mb-2">운행일보 로그인</h2>
  <p class="text-gray-500 text-sm mb-8">기록을 안전하게 동기화하기 위해 로그인이 필요합니다.</p>
  <button id="signInBtn" class="bg-white border border-slate-200 text-gray-800 hover:bg-slate-50 shadow-sm font-bold py-3 px-6 rounded-lg transition-colors flex items-center gap-2 cursor-pointer">
    <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
    Google 계정으로 로그인
  </button>
  <div id="auth-loading" class="hidden mt-4 text-indigo-500 font-bold text-sm">로그인 중...</div>
</div>

</body>
</html>
